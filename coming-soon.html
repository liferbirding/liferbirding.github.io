<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lifer — the birding game · Launching August 2026</title>
<meta name="description" content="Lifer, the birding game, is launching August 2026.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="lifer-site.css">
<style>
.cs-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:64px 24px;gap:0;position:relative;overflow:hidden;background:var(--ink);}
.cs-blob{position:absolute;width:min(760px,120vw);aspect-ratio:1;border-radius:50%;background:radial-gradient(circle at 50% 40%,rgba(232,168,56,.16),transparent 62%);top:-18%;left:50%;transform:translateX(-50%);z-index:0;pointer-events:none;}
.cs-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;}
.cs-lockup{width:min(420px,74vw);height:auto;display:block;}
.cs-tagline{font-family:var(--display);font-weight:700;font-size:clamp(18px,2.4vw,26px);letter-spacing:-.01em;color:var(--night-text-2);margin:34px 0 0;}
.cs-launch{margin-top:34px;display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);color:var(--sand);border-radius:999px;padding:14px 26px;font-family:var(--mono);font-size:14px;letter-spacing:.08em;text-transform:uppercase;}
.cs-launch .dot{width:9px;height:9px;border-radius:50%;background:var(--wattle);flex:none;box-shadow:0 0 0 5px rgba(232,168,56,.25);}
.cs-back{position:absolute;top:26px;left:26px;z-index:2;display:inline-flex;align-items:center;gap:7px;color:var(--night-text-2);font-size:14px;font-weight:600;transition:color .15s;}
.cs-back:hover{color:var(--sand);}
.cs-back svg{width:18px;height:18px;stroke:currentColor;}
</style>
</head>
<body>
<div class="cs-wrap">
  <a class="cs-back" href="index.html" aria-label="Back to Lifer"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>Back</a>
  <div class="cs-blob"></div>
  <div class="cs-inner">
    <img class="cs-lockup" src="img/wordmark-stacked-dark.svg" alt="Lifer — Capture · Collect · Compete">
    <p class="cs-tagline">The birding game</p>
    <span class="cs-launch"><span class="dot"></span>Launching August 2026</span>
  </div>
</div>
</body>
</html>
